name: Build Resource Provider

on:
  schedule:
    - cron: "15 4 * * 6"
  push:
    branches: [main]
    # Draft releases don't trigger actions, so create releases in the workflow
    # from tag events.
    tags: [resource-*]
  pull_request: ~

jobs:
  get-providers:
    runs-on: ubuntu-latest
    outputs:
      providers: ${{ steps.list-providers.outputs.keys || steps.tag-provider.outputs.keys }}
      version: ${{ steps.tag-provider.outputs.version || '0.0.1' }}
      os: ${{ steps.list-providers.outputs.os || steps.tag-provider.outputs.os }}
      arch: ${{ steps.list-providers.outputs.arch || steps.tag-provider.outputs.arch }}
    steps:
      - uses: actions/checkout@v4
      - id: tag-provider
        if: startswith(github.event.ref, 'refs/tags/')
        run: |
          echo "${{ github.ref_name }}" \
            | sed -nr 's/^resource-([a-z]+)-v([0-9].*)$/keys=["\1"]\nversion=\2/p; t; q1' >> $GITHUB_OUTPUT
          echo 'os=["darwin", "linux", "windows"]' >> $GITHUB_OUTPUT
          echo 'arch=["amd64", "arm64", "riscv64"]' >> $GITHUB_OUTPUT
      - id: list-providers
        if: ${{ !startswith(github.event.ref, 'refs/tags/') }}
        run: |
          echo 'keys<<EOF' >> $GITHUB_OUTPUT
          ls internal/provider/crd/versions \
            | xargs -I{} basename {} .yaml \
            | jq --null-input --raw-input '[inputs]' >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

          echo 'os=["linux"]' >> $GITHUB_OUTPUT
          echo 'arch=["amd64"]' >> $GITHUB_OUTPUT

  test:
    runs-on: ubuntu-latest
    needs: [get-providers]
    strategy:
      fail-fast: false
      matrix:
        provider: ${{ fromJson(needs.get-providers.outputs.providers) }}
    env:
      TF_ACC: "1"
      PROVIDER: ${{ matrix.provider }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: create kind cluster
        run: |
          kind create cluster --kubeconfig=./kubeconfig.yaml
          echo KUBECONFIG=$(pwd)/kubeconfig.yaml >> "$GITHUB_ENV"

      - name: install fixtures
        run: |
          VERSIONS=internal/provider/crd/versions/${PROVIDER}.yaml
          yq -0 '.crdSources[]' < $VERSIONS \
            | xargs -0 -n1 kubectl apply --server-side -o name --filename \
            | grep 'customresourcedefinition.apiextensions.k8s.io/' \
            | xargs --no-run-if-empty kubectl wait --for condition=established

          for i in $(seq $(yq '.extraResources | length' < $VERSIONS )); do
            yq -0 ".extraResources[$i - 1].kustomization" < $VERSIONS \
              | xargs -0 -n1 kubectl apply --server-side --kustomize
            yq -0 ".extraResources[$i - 1].wait[]" < $VERSIONS \
              | xargs -0 -n1 sh -c 'kubectl wait --timeout=2m --for $@' '$0'
          done;

      - name: configure provider
        run: |
          sed -i -e "1 {s|example\\.yaml$|${PROVIDER}.yaml|; t; q1}" internal/provider/crd/crd.go

      - name: go generate
        run: |
          go install ./cmd/openapi
          go generate -x ./internal/provider/crd/...

      - name: upload type info
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.provider }}-typeInfos
          path: internal/provider/crd/typeInfos.bin

      - name: go test
        run: |
          go test -v $(go list -f '{{ join .Deps "\n" }}' ./cmd/provider | grep github.com/kwohlfahrt/terraform-provider-k8scrd)

  build:
    runs-on: ubuntu-latest
    needs: [get-providers, test]
    strategy:
      matrix:
        provider: ${{ fromJson(needs.get-providers.outputs.providers) }}
        os: ${{ fromJson(needs.get-providers.outputs.os) }}
        arch: ${{ fromJson(needs.get-providers.outputs.arch) }}
        exclude:
          - { os: darwin, arch: riscv64 }
          - { os: windows, arch: riscv64 }
    env:
      PROVIDER: ${{ matrix.provider }}
      VERSION: ${{ needs.get-providers.outputs.version }}
      GOOS: ${{ matrix.os }}
      GOARCH: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: download generated code
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.provider }}-typeInfos
          path: internal/provider/crd

      - name: go build
        id: build
        run: |
          PROVIDER_NAME=terraform-provider-k8s-${PROVIDER}_v${VERSION}
          go build -o $PROVIDER_NAME -ldflags "-X main.version=$VERSION -X main.provider=$PROVIDER" ./cmd/provider

          ZIP_NAME=terraform-provider-k8s-${PROVIDER}_${VERSION}_${GOOS}_${GOARCH}.zip
          echo zip-name=${ZIP_NAME} >> $GITHUB_OUTPUT
          zip ${ZIP_NAME} $PROVIDER_NAME

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.zip-name }}
          path: ${{ steps.build.outputs.zip-name }}

  publish:
    runs-on: ubuntu-latest
    needs: [get-providers, build]
    permissions:
      contents: write
    strategy:
      matrix:
        provider: ${{ fromJson(needs.get-providers.outputs.providers) }}
    env:
      PROVIDER: ${{ matrix.provider }}
      VERSION: ${{ needs.get-providers.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: terraform-provider-k8s-${{ env.PROVIDER }}_*
          merge-multiple: true
      - name: generate version.json
        run: |
          ls *.zip \
            | sed -r 's/terraform-provider-k8s-'${PROVIDER}_${VERSION}'_([a-z]+)_([a-z0-9]+).zip/{"os": "\1", "arch": "\2"}/' \
            | jq --slurp '{"version": $ENV.VERSION, "protocols": ["6.0"], "platforms": .}' \
            > version.json
      - run: shasum -a 256 terraform-provider-k8s-*.zip > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        if: startswith(github.event.ref, 'refs/tags/')
        with:
          name: ${{ env.PROVIDER }} ${{ env.VERSION }}
          draft: true
          fail_on_unmatched_files: true
          files: |
            terraform-provider-k8s-*.zip
            SHA256SUMS
            version.json
